<div class="container py-4" style="max-width: 1000px;">

  <h2 class="pub-titulo mb-4">
    <i class="bi bi-bar-chart me-2"></i>Estadísticas
  </h2>

  <!-- Filtros de fecha -->
  <div class="card-ui p-3 mb-4">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <div class="d-flex align-items-center gap-2">
        <label class="text-muted small fw-semibold">Desde</label>
        <input type="date" class="form-control form-control-ui form-control-sm"
               [value]="desde()"
               (change)="desde.set($any($event.target).value)"/>
      </div>
      <div class="d-flex align-items-center gap-2">
        <label class="text-muted small fw-semibold">Hasta</label>
        <input type="date" class="form-control form-control-ui form-control-sm"
               [value]="hasta()"
               (change)="hasta.set($any($event.target).value)"/>
      </div>
      <button class="btn btn-ui-primary btn-sm" (click)="cargarEstadisticas()"
              [disabled]="cargando()">
        @if (cargando()) {
          <span class="spinner-border spinner-border-sm me-1"></span>
        } @else {
          <i class="bi bi-arrow-clockwise me-1"></i>
        }
        Actualizar
      </button>
    </div>
  </div>

  @if (cargando()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary mb-3"></div>
      <p class="text-muted small">Cargando estadísticas...</p>
    </div>
  } @else {
    <div class="row g-4">

      <!-- Gráfico 1 — Torta: publicaciones por usuario -->
      <div class="col-12 col-md-6">
        <div class="card-ui p-4 h-100">
          <h6 class="fw-bold mb-1">Publicaciones por usuario</h6>
          <p class="text-muted small mb-3">Distribución de publicaciones entre usuarios</p>
          <div style="position: relative; height: 260px;">
            <canvas #chartPub></canvas>
          </div>
        </div>
      </div>

      <!-- Gráfico 2 — Líneas: comentarios por día -->
      <div class="col-12 col-md-6">
        <div class="card-ui p-4 h-100">
          <h6 class="fw-bold mb-1">Comentarios por día</h6>
          <p class="text-muted small mb-3">Actividad de comentarios en el período</p>
          <div style="position: relative; height: 260px;">
            <canvas #chartCom></canvas>
          </div>
        </div>
      </div>

      <!-- Gráfico 3 — Barras: comentarios por publicación -->
      <div class="col-12">
        <div class="card-ui p-4">
          <h6 class="fw-bold mb-1">Comentarios por publicación</h6>
          <p class="text-muted small mb-3">Top 10 publicaciones con más comentarios</p>
          <div style="position: relative; height: 280px;">
            <canvas #chartPubCom></canvas>
          </div>
        </div>
      </div>

    </div>
  }

</div>
